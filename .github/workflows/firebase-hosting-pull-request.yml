# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
env:
  # `FirebaseExtended/action-hosting-deploy@v0` is not yet Node 24 compatible.
  # This keeps Node 20-based JS actions working until the action is updated.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 18 to prevent Google Auth network errors
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHEDULER_APP2503 }}
          projectId: scheduler-app2503
